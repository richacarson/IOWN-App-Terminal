<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a110d">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>IOWN Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a110d;--bg2:#0f1a14;--card:#121f18;--card2:#172a20;--card-hover:#1a3125;
  --border:rgba(74,222,128,.08);--border2:rgba(74,222,128,.14);
  --green:#4ade80;--green2:#22c55e;--greenSoft:rgba(74,222,128,.12);--greenGlow:rgba(74,222,128,.25);
  --red:#fb7185;--redSoft:rgba(251,113,133,.1);
  --gold:#fbbf24;--goldSoft:rgba(251,191,36,.1);
  --blue:#60a5fa;--blueSoft:rgba(96,165,250,.1);
  --text:#e8f0ea;--text2:#c0d4c6;--muted:#7a9d85;--dim:#4a6e55;--faint:#2a4535;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;--serif:'Source Serif 4',Georgia,serif;
  --radius:10px;--radius-sm:6px;--radius-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,.4);--shadow-lg:0 12px 48px rgba(0,0,0,.6);
}
html{font-size:15px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;height:100dvh;-webkit-font-smoothing:antialiased}
input,button,select{font-family:var(--sans)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--faint);border-radius:3px}
a{color:var(--green);text-decoration:none}a:hover{opacity:.85}

/* APP SHELL */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER - minimal Robinhood style */
.hdr{display:flex;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;gap:16px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{width:34px;height:34px;border-radius:8px;object-fit:contain}
.logo-text{font:700 17px var(--serif);color:var(--text);letter-spacing:-.01em}
.logo-sub{font:400 9px var(--mono);color:var(--dim);letter-spacing:.12em;text-transform:uppercase}

/* NAV */
.nav{display:flex;gap:2px;background:rgba(255,255,255,.03);border-radius:8px;padding:3px;margin-left:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
.nav-btn{padding:7px 14px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;font:500 12px var(--sans);transition:all .2s;white-space:nowrap}
.nav-btn:hover{color:var(--text2)}
.nav-btn.active{background:var(--greenSoft);color:var(--green);font-weight:600}

/* HEADER RIGHT */
.hdr-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.clock{font:400 11px var(--mono);color:var(--dim);text-align:right;line-height:1.4}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;box-shadow:0 0 6px currentColor}
.cfg-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s}
.cfg-btn:hover{background:rgba(255,255,255,.08);color:var(--text2)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth}
@media(max-width:768px){.main{padding:12px}}

/* STAT CARDS - horizontal scroll on mobile */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.stats-row{grid-template-columns:1fr 1fr;gap:8px}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .25s}
.stat-card:hover{border-color:var(--border2);background:var(--card2)}
.stat-card.active{border-color:var(--green2);background:var(--greenSoft);box-shadow:0 0 20px rgba(74,222,128,.08)}
.stat-label{font:500 10px var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font:700 24px var(--mono);line-height:1}
.stat-sub{font:400 11px var(--sans);color:var(--muted);margin-top:5px}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search{flex:0 1 260px;min-width:160px;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none;transition:border .2s}
.search:focus{border-color:var(--border2)}
.search::placeholder{color:var(--dim)}
.filter-btn{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font:500 11px var(--sans);transition:all .2s;letter-spacing:.02em}
.filter-btn:hover{border-color:var(--border2);color:var(--text2)}
.filter-btn.active{border-color:var(--green2);background:var(--greenSoft);color:var(--green)}
.view-toggle{display:flex;gap:1px;background:rgba(255,255,255,.03);border-radius:6px;padding:2px;margin-left:6px}
.view-toggle-btn{padding:5px 12px;border-radius:4px;border:none;background:transparent;color:var(--dim);cursor:pointer;font:500 10px var(--mono);transition:all .2s;text-transform:uppercase;letter-spacing:.06em}
.view-toggle-btn.active{background:var(--greenSoft);color:var(--green)}
.btn{padding:8px 18px;border-radius:var(--radius-sm);border:none;background:var(--green2);color:#0a110d;cursor:pointer;font:600 12px var(--sans);transition:all .2s}
.btn:hover{background:var(--green)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);font:500 11px var(--sans)}
.btn-outline:hover{border-color:var(--border2);color:var(--text2)}
.btn-danger{border-color:rgba(251,113,133,.2);color:var(--red)}

/* TABLE */
.tbl-wrap{border-radius:var(--radius);border:1px solid var(--border);overflow-x:auto;background:var(--card);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font:500 10px var(--mono);color:var(--dim);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;background:var(--card);z-index:1}
th:hover{color:var(--muted)}
td{padding:10px 12px;border-bottom:1px solid var(--border);font:400 12.5px var(--mono);white-space:nowrap}
tr.row{cursor:pointer;transition:background .15s}
tr.row:hover{background:var(--card-hover)}
.tk{font-weight:600;color:var(--green);font-size:13px;letter-spacing:.01em}
.co{font:400 10px var(--sans);color:var(--dim);margin-top:1px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font:500 9px var(--sans);letter-spacing:.04em}
.badge-sector{background:rgba(255,255,255,.04);color:var(--muted)}
.badge-div{background:var(--greenSoft);color:var(--green)}
.badge-grw{background:var(--goldSoft);color:var(--gold)}
.badge-dgt{background:var(--blueSoft);color:var(--blue)}

/* FULL-SCREEN DETAIL OVERLAY */
.detail-overlay{position:fixed;inset:0;z-index:1000;background:var(--bg);overflow-y:auto;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{position:sticky;top:0;background:var(--bg);z-index:10;padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.detail-back{background:none;border:none;color:var(--muted);cursor:pointer;font:500 14px var(--sans);display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;transition:all .2s}
.detail-back:hover{background:rgba(255,255,255,.04);color:var(--text)}
.detail-body{padding:20px;max-width:900px;margin:0 auto}
@media(max-width:768px){.detail-body{padding:14px}}
.detail-price{font:700 36px var(--mono);letter-spacing:-.02em}
@media(max-width:768px){.detail-price{font-size:28px}}
.detail-change{font:600 16px var(--mono);margin-left:12px}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}
@media(max-width:768px){.detail-grid{grid-template-columns:repeat(2,1fr);gap:8px}}
@media(max-width:400px){.detail-grid{grid-template-columns:repeat(2,1fr);gap:6px}}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
.metric-label{font:500 9px var(--mono);color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.metric-val{font:600 15px var(--mono);color:var(--text)}

/* DETAIL TABS */
.dtabs{display:flex;gap:0;margin:20px 0 16px;border-bottom:1px solid var(--border);overflow-x:auto}
.dtab{padding:10px 18px;font:500 13px var(--sans);color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.dtab:hover{color:var(--text2)}
.dtab.active{color:var(--green);border-bottom-color:var(--green)}

/* SCREENER */
.screener-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.screener-filters select,.screener-filters input{padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;outline:none}

/* ALLOCATION VIEW */
.alloc-bar{display:flex;height:32px;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:16px}
.alloc-segment{transition:all .3s;position:relative;display:flex;align-items:center;justify-content:center}
.alloc-segment span{font:500 9px var(--mono);color:#0a110d;text-shadow:0 1px 2px rgba(0,0,0,.3);white-space:nowrap;overflow:hidden}
.alloc-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.alloc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm)}

/* NEWS CARDS */
.news-card{display:block;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;transition:all .2s;cursor:pointer}
.news-card:hover{border-color:var(--border2);background:var(--card2)}
.news-title{font:600 14px var(--sans);color:var(--text);margin-bottom:4px;line-height:1.35}
.news-summary{font:400 12px var(--sans);color:var(--muted);line-height:1.5}
.news-meta{font:400 10px var(--mono);color:var(--dim);margin-top:6px}

/* SIGNAL ROWS */
.sig-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--border)}
.sig-badge{padding:3px 8px;border-radius:4px;font:600 9px var(--mono);letter-spacing:.06em}

/* CONFIG PANEL */
.config{position:fixed;top:0;right:0;width:340px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);padding:20px;z-index:1100;overflow-y:auto;box-shadow:var(--shadow-lg)}
@media(max-width:500px){.config{width:100%}}
.config-section{padding:14px;background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:12px}

/* PROGRESS BAR */
.progress-bar{height:2px;background:var(--faint);border-radius:1px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green2),var(--green));transition:width .3s}

/* SECTOR GRID */
.sector-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:700px){.sector-grid{grid-template-columns:1fr}}

/* AI */
.ai-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.ai-input{width:100%;padding:12px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font:400 14px var(--sans);outline:none;transition:border .2s}
.ai-input:focus{border-color:var(--border2)}
.ai-resp{margin-top:14px;padding:14px;border-radius:var(--radius-sm);background:var(--bg);border:1px solid var(--border);font:400 13px var(--sans);line-height:1.7;white-space:pre-wrap;max-height:400px;overflow:auto}


/* SIDEBAR DRAWER */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;backdrop-filter:blur(2px);animation:fadeOverlay .2s ease}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
.sidebar{position:fixed;top:0;left:0;width:300px;max-width:85vw;height:100vh;background:var(--bg2);border-right:1px solid var(--border);z-index:801;overflow-y:auto;animation:slideIn .25s ease;padding:0}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.sidebar-hdr{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-section{padding:12px 20px}
.sidebar-section-title{font:600 10px var(--mono);color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s}
.sidebar-item:hover{padding-left:4px}
.sidebar-item:last-child{border-bottom:none}
.sidebar-item-name{font:500 15px var(--sans);color:var(--text)}
.sidebar-item.active .sidebar-item-name{color:var(--green)}
.sidebar-item-badge{font:600 12px var(--mono);padding:3px 10px;border-radius:4px}
.sidebar-nav-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;font:500 14px var(--sans);color:var(--muted);transition:color .15s}
.sidebar-nav-item:hover,.sidebar-nav-item.active{color:var(--text)}
.sidebar-create{display:flex;align-items:center;gap:8px;padding:12px 0;cursor:pointer;color:var(--dim);font:400 14px var(--sans);transition:color .15s}
.sidebar-create:hover{color:var(--green)}

/* HAMBURGER BUTTON */
.hamburger{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:4px;border-radius:4px;transition:all .15s}
.hamburger:hover{color:var(--text);background:rgba(255,255,255,.04)}
.hamburger span{display:block;width:18px;height:2px;background:currentColor;border-radius:1px}


/* MOBILE BOTTOM NAV */
.bottom-nav{display:none}
@media(max-width:768px){
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:700;padding:4px 0 env(safe-area-inset-bottom,4px) 0}
  .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;color:var(--dim);transition:color .15s;-webkit-tap-highlight-color:transparent}
  .bottom-nav-item.active{color:var(--green)}
  .bottom-nav-item span.bn-icon{font-size:18px;line-height:1}
  .bottom-nav-item span.bn-label{font:500 9px var(--mono);letter-spacing:.02em}
  .main{padding-bottom:64px!important}
  .ftr{display:none}
}


/* LONG PRESS CONTEXT MENU */
.ctx-menu{position:fixed;z-index:900;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:4px 0;min-width:180px;box-shadow:0 12px 48px rgba(0,0,0,.6);animation:fadeIn .15s ease}
.ctx-menu-item{padding:10px 16px;font:400 13px var(--sans);color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.ctx-menu-item:hover{background:rgba(74,222,128,.08)}
.ctx-menu-item.danger{color:var(--red)}
.ctx-menu-sep{height:1px;background:var(--border);margin:4px 0}

/* SCROLL TO TOP */
.scroll-top{position:fixed;bottom:72px;right:16px;width:40px;height:40px;border-radius:50%;background:var(--green);color:#0a110d;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:600;transition:all .2s;opacity:0;transform:translateY(10px);pointer-events:none}
.scroll-top.show{opacity:1;transform:translateY(0);pointer-events:auto}
.scroll-top:active{transform:scale(.9)}
@media(min-width:769px){.scroll-top{bottom:24px;right:24px}}
/* FOOTER */
.ftr{padding:8px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font:400 10px var(--mono);color:var(--dim);background:var(--bg2);flex-shrink:0}

/* MARKET PULSE BANNER */
.pulse{display:flex;align-items:center;gap:0;padding:0;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.pulse::-webkit-scrollbar{display:none}
.pulse-item{display:flex;align-items:center;gap:8px;padding:8px 16px;border-right:1px solid var(--border);white-space:nowrap;flex-shrink:0;min-width:0}
.pulse-item:last-child{border-right:none}
.pulse-sym{font:600 11px var(--mono);color:var(--text2);letter-spacing:.02em}
.pulse-price{font:500 11px var(--mono);color:var(--text)}
.pulse-chg{font:600 11px var(--mono);display:inline-flex;align-items:center;gap:2px}
@media(max-width:768px){.pulse-item{padding:6px 12px}.pulse-sym,.pulse-price,.pulse-chg{font-size:10px}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;width:90%;max-width:460px;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg)}

/* GLOBAL */
.up{color:#16a34a}.dn{color:#e11d48}.gold{color:#b45309}.blue{color:#2563eb}
.spark{display:block}

/* LIGHT TABLE ZONE */
.tbl-wrap{background:#fafcfa;border-color:#e2e8e4}
.tbl-wrap table th{background:#f0f4f1;color:#5a6b5e;border-bottom-color:#dce5de}
.tbl-wrap table td{border-bottom-color:#eef2ef;color:#1a2b1e}
.tbl-wrap table tr.row:hover{background:#f0f7f2}
.tbl-wrap .tk{color:#16a34a}
.tbl-wrap .co{color:#7a8f7e}
.tbl-wrap .badge-sector{background:#eef2ef;color:#5a6b5e}
.tbl-wrap .badge-div{background:#dcfce7;color:#16a34a}
.tbl-wrap .badge-grw{background:#fef3c7;color:#b45309}
.tbl-wrap .badge-dgt{background:#dbeafe;color:#2563eb}

/* Toolbar goes light too */
.toolbar .search{background:#f5f8f5;border-color:#dce5de;color:#1a2b1e}
.toolbar .search::placeholder{color:#94a89a}
.toolbar .view-toggle{background:#eef2ef}
.toolbar .view-toggle-btn{color:#7a8f7e}
.toolbar .view-toggle-btn.active{background:#dcfce7;color:#16a34a}

/* MOBILE: hide less important columns */
@media(max-width:768px){
  .hdr{padding:8px 12px;gap:8px}
  .nav-btn{padding:6px 10px;font-size:11px}
  .hide-mobile{display:none!important}
  .detail-price{font-size:26px}
  .detail-change{font-size:14px}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef,memo} = React;

// ════════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════════

const fmt = (n,d=2) => n!=null&&isFinite(n)?Number(n).toFixed(d):"—";
const fmtPct = n => n!=null&&isFinite(n)?(n>=0?"+":"")+Number(n).toFixed(2)+"%":"—";
const fmtVol = n => {if(!n)return"—";if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(0)+"K";return n+""};
const fmtMC = n => {if(!n||n===0)return"—";if(n>=1e6)return"$"+(n/1e3).toFixed(0)+"B";if(n>=1e3)return"$"+n.toFixed(0)+"M";return"$"+n.toFixed(0)+"M"};
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const clx = (...c) => c.filter(Boolean).join(" ");
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem("iown_"+k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem("iown_"+k,JSON.stringify(v))}catch{}}
};

// Haptic feedback
const haptic=(style="light")=>{try{if(navigator.vibrate){navigator.vibrate(style==="heavy"?[30]:style==="medium"?[15]:[8])}}catch{}};

// SPARKLINE
// ════════════════════════════════════════════════════════════════
const Spark = memo(({data,w=70,h=22,color})=>{
  if(!data||data.length<2)return <span style={{color:"var(--dim)",fontSize:9}}>—</span>;
  const mn=Math.min(...data),mx=Math.max(...data),r=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/r)*(h-4)-2}`).join(" ");
  return <svg className="spark" width={w} height={h}><polyline fill="none" stroke={color} strokeWidth="1.5" points={pts}/></svg>;
});

        const d=await fh(`${FH}/stock/metric?symbol=${t}&metric=all&token=${API_KEY}`);
        if(d&&d.metric)m[t]=d.metric;
        done++;setFetchPct(40+Math.round(done/total*30));
        await sleep(1100);
      }
      setMetrics(prev=>({...prev,...m}));LS.set("metrics",{...metrics,...m});
      // Phase 3: Candles
      done=0;const now=Math.floor(Date.now()/1000),from90=now-90*86400;
      for(const t of allTickers){
        setFetchMsg(`Charts: ${t}`);
        const d=await fh(`${FH}/stock/candle?symbol=${t}&resolution=D&from=${from90}&to=${now}&token=${API_KEY}`);
        if(d&&d.s==="ok"&&d.c)c[t]=d.c;
        done++;setFetchPct(70+Math.round(done/total*30));
        await sleep(1100);
      }
      setCandles(prev=>({...prev,...c}));LS.set("candles",{...candles,...c});
    }
    setFetchPct(100);setFetchMsg("Complete");
    setLastRefresh(new Date().toISOString());LS.set("lastRefresh",new Date().toISOString());
    setTimeout(()=>{setLoading(false);setFetchPct(0)},500);
  },[allTickers,fh,quotes,metrics,candles]);

  // ── FETCH STOCK DETAIL DATA ──
  const fetchStockDetail=useCallback(async(t)=>{

      if(d)setStockNews(prev=>({...prev,[t]:d.slice(0,8)}));
    }

    if(!earnings[t]){
      const d=await fh(`${FH}/stock/earnings?symbol=${t}&limit=8&token=${API_KEY}`);
      if(d)setEarnings(prev=>({...prev,[t]:d}));
    }
    // Peers
    if(!peers[t]){
      const d=await fh(`${FH}/stock/peers?symbol=${t}&token=${API_KEY}`);
      if(d)setPeers(prev=>({...prev,[t]:d.filter(p=>p!==t).slice(0,12)}));
    }
    // Recs
    if(!recs[t]){
      const d=await fh(`${FH}/stock/recommendation?symbol=${t}&token=${API_KEY}`);

  const stockData=useMemo(()=>{

      const sma50=m["50DayMovingAverage"]||null;
      const high52=m["52WeekHigh"]||null;const low52=m["52WeekLow"]||null;
      data[t]={
        ticker:t,name:NAMES[t]||p.name||t,sector:SECTOR_MAP[t]||p.finnhubIndustry||"—",
        portfolio:getPortfolio(t),
        price:q.c||0,change:q.d||0,changePct:q.dp||0,
        prevClose:q.pc||0,open:q.o||0,high:q.h||0,low:q.l||0,
        pe:m["peBasicExclExtraTTM"]||m["peTTM"]||null,
        divYield:m["dividendYieldIndicatedAnnual"]||null,
        marketCap:m["marketCapitalization"]||null,
        volume:m["10DayAverageTradingVolume"]||null,
        beta:m["beta"]||null,
        epsAnnual:m["epsBasicExclExtraItemsAnnual"]||null,
        sma200,sma50,
        aboveSMA200:hasData&&sma200?(q.c>sma200):null,
        fiftyTwoHigh:high52,fiftyTwoLow:low52,
        distFromHigh:hasData&&high52?((q.c-high52)/high52*100):null,
        distFromLow:hasData&&low52?((q.c-low52)/low52*100):null,
        roe:m["roeTTM"]||null,grossMargin:m["grossMarginTTM"]||null,netMargin:m["netProfitMarginTTM"]||null,
        debtEquity:m["totalDebt/totalEquityAnnual"]||null,currentRatio:m["currentRatioAnnual"]||null,
        revenueGrowthYoY:m["revenueGrowthQuarterlyYoy"]||null,
        revenueGrowth5Y:m["revenueGrowth5Y"]||null,
        pegTTM:m["pegRatio"]||null,
        sparkline:candles[t]||null,
        inspireScore:inspireScores[t]!=null?inspireScores[t]:null,
        peFwd:(fmpEstimates[t]||{}).peFwd||(fmpDividendData[t]||{}).peFwd||null,
        pegFwd:(fmpEstimates[t]||{}).pegFwd||null,
        fwdEPS:(fmpEstimates[t]||{}).fwdEPS||null,
        consecPayments:(fmpDividendData[t]||{}).consecPayments||null,
        consecGrowth:(fmpDividendData[t]||{}).consecGrowth||null,
        divGrowth5Y:(fmpDividendData[t]||{}).divGrowth5Y||null,
        ret1w:(perfData[t]||{}).w1||null,
        ret1m:(perfData[t]||{}).m1||null,
        ret3m:(perfData[t]||{}).m3||null,
        retYtd:(perfData[t]||{}).ytd||null,
        hasData

    });

  // ── SORT & FILTER ──
  const handleSort=k=>{if(sortKey===k)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortKey(k);setSortDir("asc")}};
  const filtered=useMemo(()=>{
    let tks=[...allTickers];
    if(portfolios[filter])tks=tks.filter(t=>portfolios[filter].tickers.includes(t));

      const s=search.toLowerCase();
      tks=tks.filter(t=>{const d=stockData[t];return t.toLowerCase().includes(s)||(d.name||"").toLowerCase().includes(s)||(d.sector||"").toLowerCase().includes(s)});
    }
    tks.sort((a,b)=>{
      const da=stockData[a]||{},db=stockData[b]||{};
      let va,vb;
      switch(sortKey){
        case"price":va=da.price;vb=db.price;break;
        case"change":va=da.changePct;vb=db.changePct;break;
        case"pe":va=da.pe;vb=db.pe;break;
        case"yield":va=da.divYield;vb=db.divYield;break;
        case"mktcap":va=da.marketCap;vb=db.marketCap;break;
        case"sector":va=da.sector;vb=db.sector;return sortDir==="asc"?(va||"").localeCompare(vb||""):(vb||"").localeCompare(va||"");
        case"ytd":va=da.retYtd;vb=db.retYtd;break;
        default:va=a;vb=b;return sortDir==="asc"?va.localeCompare(vb):vb.localeCompare(va);
      }
      va=va||0;vb=vb||0;return sortDir==="asc"?va-vb:vb-va;
    });
    return tks;
  },[allTickers,filter,search,sortKey,sortDir,stockData,portfolios]);

      articles=articles.filter(a=>{if(seen.has(a.headline))return false;seen.add(a.headline);return true})
        .sort((a,b)=>b.datetime-a.datetime).slice(0,25);
    } else {
      // Use NewsData.io for macro categories
      let ndUrl=`https://newsdata.io/api/1/latest?apikey=${NEWSDATA_KEY}&language=en&country=us`;
      if(cat==="economy")ndUrl+=`&category=business&q=economy OR inflation OR "federal reserve" OR GDP OR jobs OR tariff OR interest rate OR recession`;
      else if(cat==="geopolitics")ndUrl+=`&category=politics,world&q=geopolitics OR war OR sanctions OR trade war OR China OR Russia OR Iran OR NATO OR Middle East OR Ukraine`;
      else ndUrl+=`&category=business`; // broad market
      try{
        const r=await fetch(ndUrl);
        const d=await r.json();
        if(d&&d.results){
          articles=d.results.map(a=>({
            headline:a.title||"",
            summary:a.description||"",
            url:a.link||"#",
            source:a.source_name||a.source_id||"",
            datetime:a.pubDate?Math.floor(new Date(a.pubDate).getTime()/1000):Date.now()/1000,
            image:a.image_url||null
          })).slice(0,20);
        }
      }catch(e){console.log("NewsData error:",e)}
    }

    setNewsData(prev=>({...prev,[cat]:{articles,fetched:Date.now()}}));
    setNewsLoading(false);
  },[fh,portfolios]);

  // ── PORTFOLIO NARRATOR ──
  const narratePortfolio=useCallback(async(portKey)=>{
    if(!aiKey)return;
    setNarrativeLoading(portKey);
    const p=portfolios[portKey];if(!p)return;
    const tks=p.tickers;
    const holdings=tks.map(t=>{const d=stockData[t]||{};return t+": $"+(d.price||"?")+" ("+(d.changePct!=null?(d.changePct>=0?"+":"")+d.changePct.toFixed(2)+"%":"no data")+"), YTD: "+(d.retYtd!=null?(d.retYtd>=0?"+":"")+d.retYtd.toFixed(1)+"%":"?")+", P/E: "+(d.pe||"?")+", Yield: "+(d.divYield?d.divYield.toFixed(2)+"%":"N/A")}).join("\n");
    const prompt="You are IOWN portfolio analyst. Give a concise 3-sentence narrative of the "+p.name+" portfolio ("+tks.length+" stocks). Cover: today performance (leaders/laggards), notable valuation outliers, one actionable insight. Be specific with tickers and numbers. No preamble.\n\nHoldings:\n"+holdings;
    try{
      const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+aiKey,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      const d=await r.json();
      const text=d?.candidates?.[0]?.content?.parts?.[0]?.text||"Unable to generate summary.";
      setSidebarNarrative(prev=>({...prev,[portKey]:{text,time:Date.now()}}));
    }catch(e){console.log("Narrator error:",e)}
    setNarrativeLoading(null);
  },[aiKey,portfolios,stockData]);

  // ── AI NEWS DIGEST ──
  const generateDigest=useCallback(async(cat)=>{
    if(!aiKey)return;
    const cached=newsData[cat];
    if(!cached||!cached.articles||cached.articles.length===0)return;
    setDigestLoading(true);
    const headlines=cached.articles.slice(0,12).map((a,i)=>(i+1)+". "+a.headline+(a.ticker?" ("+a.ticker+")":"")).join("\n");
    const catName=(NEWS_CATEGORIES.find(c=>c.k===cat)||{}).label||cat;
    const prompt="You are IOWN research analyst. Summarize these "+catName+" headlines into a 3-4 sentence digest for a portfolio manager. Highlight actionable themes and portfolio implications. Be specific. No preamble.\n\nHeadlines:\n"+headlines;
    try{
      const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+aiKey,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      const d=await r.json();
      const text=d?.candidates?.[0]?.content?.parts?.[0]?.text||"Unable to generate digest.";
      setNewsDigest(prev=>({...prev,[cat]:{text,time:Date.now()}}));
    }catch(e){console.log("Digest error:",e)}
    setDigestLoading(false);
  },[aiKey,newsData]);

  // Auto-fetch when category changes if stale (>10 min)
  useEffect(()=>{
    const cached=newsData[newsCategory];
    if(!cached||!cached.fetched||(Date.now()-cached.fetched>600000)){
      fetchCategoryNews(newsCategory);
    }
  },[newsCategory]);

  const renderNews=()=>{
    const cached=newsData[newsCategory]||{};
    const articles=cached.articles||[];
    return(
    <>
      <h2 style={{fontSize:22,fontFamily:"var(--serif)",marginBottom:12}}>News</h2>

      {/* Category chips */}
      <div style={{display:"flex",gap:8,marginBottom:18,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>
        {NEWS_CATEGORIES.map(c=>(
          <button key={c.k} onClick={()=>setNewsCategory(c.k)}
            style={{
              display:"flex",alignItems:"center",gap:5,
              padding:"8px 14px",borderRadius:20,border:"1px solid "+(newsCategory===c.k?"#16a34a":"#dce5de"),
              background:newsCategory===c.k?"#dcfce7":"#f5f8f5",
              color:newsCategory===c.k?"#16a34a":"#5a6b5e",
              cursor:"pointer",fontSize:13,fontFamily:"var(--sans)",fontWeight:newsCategory===c.k?600:400,
              whiteSpace:"nowrap",flexShrink:0,transition:"all .2s"
            }}>
            <span style={{fontSize:14}}>{c.icon}</span>{c.label}
          </button>
        ))}
      </div>

      {/* AI Digest */}
      {(()=>{
        const digest=newsDigest[newsCategory];
        const hasArticles=(newsData[newsCategory]?.articles||[]).length>0;
        return(
          <div style={{marginBottom:16}}>
            {digest&&(
              <div style={{background:"linear-gradient(135deg,#f0fdf4,#f5f8f5)",border:"1px solid #dce5de",borderRadius:12,padding:14,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:10,fontFamily:"var(--mono)",color:"#5a6b5e",fontWeight:600}}>\u2728 AI DIGEST</span>
                  <span style={{fontSize:9,fontFamily:"var(--mono)",color:"#94a89a"}}>{new Date(digest.time).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}</span>
                </div>
                <div style={{fontSize:13,lineHeight:1.65,color:"#1a2b1e"}}>{digest.text}</div>
              </div>
            )}
            {hasArticles&&!newsLoading&&(
              <button onClick={()=>{haptic();generateDigest(newsCategory)}} disabled={digestLoading}
                style={{background:"none",border:"1px solid #dce5de",borderRadius:8,padding:"6px 14px",fontSize:12,color:digestLoading?"#94a89a":"#16a34a",cursor:digestLoading?"wait":"pointer",fontFamily:"var(--sans)"}}>
                {digestLoading?"Generating digest...":digest?"\u21bb Refresh Digest":"\u2728 Generate AI Digest"}
              </button>
            )}
          </div>
        );
      })()}

      {/* Loading */}
      {newsLoading&&(
        <div style={{textAlign:"center",padding:30,color:"#7a8f7e",fontSize:13}}>
          Loading {NEWS_CATEGORIES.find(c=>c.k===newsCategory)?.label} news...
        </div>
      )}

      {/* Articles */}
      {!newsLoading&&articles.length===0&&(
        <div style={{textAlign:"center",padding:40,color:"#94a89a"}}>
          <div style={{fontSize:28,marginBottom:8}}>{NEWS_CATEGORIES.find(c=>c.k===newsCategory)?.icon}</div>
          <div style={{fontSize:14}}>No recent articles found</div>
          <button className="btn btn-sm" style={{marginTop:12}} onClick={()=>fetchCategoryNews(newsCategory)}>Try Again</button>
        </div>
      )}

      {articles.map((n,i)=>(
        <a key={i} href={n.url} target="_blank" rel="noreferrer" style={{
          display:"block",padding:"16px 0",borderBottom:"1px solid #eef2ef",textDecoration:"none",transition:"all .15s"
        }}>
          <div style={{fontSize:16,fontWeight:600,color:"#1a2b1e",lineHeight:1.35,marginBottom:4,fontFamily:"var(--sans)"}}>{n.headline}</div>
          {n.summary&&<div style={{fontSize:13,color:"#7a8f7e",lineHeight:1.5,marginBottom:6}}>{n.summary.slice(0,180)}...</div>}
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:11,fontFamily:"var(--mono)"}}>
            {n.ticker&&<span style={{color:"#16a34a",fontWeight:600}}>{n.ticker}</span>}
            <span style={{color:"#94a89a"}}>{n.source}</span>
            <span style={{color:"#b8c8bc"}}>·</span>
            <span style={{color:"#94a89a"}}>{n.datetime?new Date(n.datetime*1000).toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):""}</span>
          </div>
        </a>
      ))}

      {articles.length>0&&cached.fetched&&(
        <div style={{textAlign:"center",padding:16,fontSize:10,color:"#b8c8bc",fontFamily:"var(--mono)"}}>
          Updated {new Date(cached.fetched).toLocaleTimeString()} · <span style={{cursor:"pointer",color:"#16a34a"}} onClick={()=>fetchCategoryNews(newsCategory)}>Refresh</span>
        </div>
      )}
    </>
    );
  };

  // ════════════════════════════════════════════════════════════
  // MAIN RENDER
  // ════════════════════════════════════════════════════════════
  return(
    <div className="app">
      {/* FULL-SCREEN DETAIL */}
      {renderDetailOverlay()}

      {/* HEADER */}
      <header className="hdr">
        <button className="hamburger" onClick={()=>{haptic();setShowSidebar(true)}} aria-label="Menu">
          <span/><span/><span/>
        </button>
        <div className="logo">
          <img src={SHIELD_LOGO} className="logo-mark" alt="IOWN" style={{width:34,height:34,borderRadius:8,objectFit:"contain"}}/>
          <div><div className="logo-text">IOWN Terminal</div><div className="logo-sub">Research Reveals Opportunities</div></div>
        </div>
        <div className="hdr-right">
          {loading&&<span style={{fontSize:10,color:"var(--gold)",fontFamily:"var(--mono)"}}>{fetchPct}%</span>}
          <div className="clock hide-mobile">
            <div>{clock.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</div>
            <div style={{fontSize:8}}>{clock.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
          </div>
          <span className="status-dot" style={{color:hasData?"var(--green)":"var(--gold)",background:hasData?"var(--green)":"var(--gold)"}}/>

        </div>
      </header>

      {/* MARKET PULSE BANNER */}

                <span style={{color:"var(--dim)",fontSize:10}}>···</span>

            </div>
          );

        <div className="pulse-item" style={{borderRight:"none",marginLeft:"auto",cursor:"pointer",opacity:.5}} onClick={fetchPulse} title="Refresh market data">
          <span style={{fontSize:10,color:"var(--dim)"}}>↻</span>
        </div>
      </div>

      {/* LONG PRESS CONTEXT MENU */}
      {longPressMenu&&(
        <>
          <div style={{position:"fixed",inset:0,zIndex:899}} onClick={()=>setLongPressMenu(null)}/>
          <div className="ctx-menu" style={{top:Math.min(longPressMenu.y,window.innerHeight-250),left:Math.min(longPressMenu.x,window.innerWidth-200)}}>

              {longPressMenu.ticker}
              <span style={{fontWeight:400,fontSize:11,color:"var(--muted)",marginLeft:"auto"}}>{(stockData[longPressMenu.ticker]||{}).name||""}</span>
            </div>
            <div className="ctx-menu-sep"/>
            <div className="ctx-menu-item" onClick={()=>{haptic();setSelected(longPressMenu.ticker);setDetailTab("overview");setLongPressMenu(null)}}>
              📊 View Details
            </div>
            <div className="ctx-menu-item" onClick={()=>{haptic();setSelected(longPressMenu.ticker);setDetailTab("chart");setLongPressMenu(null)}}>
              📈 Open Chart
            </div>
            <div className="ctx-menu-item" onClick={()=>{haptic();setShowMoveModal(longPressMenu.ticker);setLongPressMenu(null)}}>
              📁 Move to Portfolio
            </div>
            <div className="ctx-menu-item" onClick={()=>{haptic();const v=prompt(`Inspire Score for ${longPressMenu.ticker} (-100 to 100):`,inspireScores[longPressMenu.ticker]!=null?inspireScores[longPressMenu.ticker]:"");if(v!=null&&v!=="")setInspireScores(p=>({...p,[longPressMenu.ticker]:parseInt(v)}));setLongPressMenu(null)}}>
              ⭐ Set Inspire Score
            </div>
            <div className="ctx-menu-sep"/>
            <div className="ctx-menu-item danger" onClick={()=>{haptic("medium");removeStock(longPressMenu.ticker);setLongPressMenu(null)}}>
              🗑 Remove from Portfolio
            </div>
          </div>
        </>
      )}

      {/* SIDEBAR DRAWER */}
      {showSidebar&&(
        <>
          <div className="sidebar-overlay" onClick={()=>setShowSidebar(false)}/>
          <div className="sidebar">
            <div className="sidebar-hdr">
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <img src={SHIELD_LOGO} style={{width:28,height:28,objectFit:"contain"}} alt=""/>
                <span style={{font:"700 15px var(--serif)"}}>IOWN Terminal</span>
              </div>
              <button onClick={()=>setShowSidebar(false)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,padding:4}}>✕</button>
            </div>

            {/* Navigation */}
            <div className="sidebar-section">
              {[{k:"portfolio",l:"Portfolio",icon:"📊"},{k:"screener",l:"Screener",icon:"🔍"},{k:"allocation",l:"Allocation",icon:"📐"},{k:"research",l:"AI Research",icon:"✨"},{k:"news",l:"News",icon:"📰"}].map(v=>(
                <div key={v.k} className={clx("sidebar-nav-item",view===v.k&&"active")} onClick={()=>{setView(v.k);setShowSidebar(false)}}>
                  <span>{v.icon}</span><span>{v.l}</span>
                </div>
              ))}
            </div>

            {/* Portfolios */}
            <div className="sidebar-section" style={{borderTop:"1px solid var(--border)"}}>
              <div className="sidebar-section-title">📈 Portfolios</div>
              {portKeys.map(k=>{
                const p=portfolios[k];
                const tks=p.tickers;
                const avgChg=tks.length>0&&hasData?tks.reduce((s,t)=>s+((stockData[t]||{}).changePct||0),0)/tks.length:null;
                return(
                  <div key={k} className={clx("sidebar-item",filter===k&&view==="portfolio"&&"active")} onClick={()=>{haptic();setFilter(k);setView("portfolio");if(p.dataView==="none")setViewMode("change");setShowSidebar(false)}}>
                    <div>
                      <div className="sidebar-item-name">{p.name}</div>
                      <div style={{fontSize:11,color:"var(--dim)",fontFamily:"var(--mono)",marginTop:2}}>{tks.length} stocks</div>
                    </div>
                    <div className="sidebar-item-badge" style={{background:avgChg!=null?(avgChg>=0?"#dcfce7":"#ffe4e6"):"rgba(255,255,255,.05)",color:avgChg!=null?(avgChg>=0?"#16a34a":"#e11d48"):"var(--dim)"}}>
                      {avgChg!=null?(avgChg>=0?"+":"")+avgChg.toFixed(2)+"%":"—"}
                    </div>
                  </div>
                );
              })}
              <div className="sidebar-create" onClick={()=>{const n=prompt("New portfolio name:");if(n){createPortfolio(n);setFilter(n.toLowerCase().replace(/[^a-z0-9]/g,"_"));setView("portfolio");setShowSidebar(false)}}}>
                <span style={{fontSize:18,lineHeight:1}}>+</span>
                <span>Create Portfolio</span>
              </div>
            </div>

            {/* Quick actions */}
            <div className="sidebar-section" style={{borderTop:"1px solid var(--border)"}}>
              <div className="sidebar-section-title">⚡ Quick Actions</div>
              <div className="sidebar-nav-item" onClick={()=>{setShowPortfolioManager(true);setShowSidebar(false)}}>
                <span>⚙</span><span>Manage Portfolios</span>
              </div>
              <div className="sidebar-nav-item" onClick={()=>{setShowConfig(true);setShowSidebar(false)}}>
                <span>🔧</span><span>Settings</span>
              </div>
              <div className="sidebar-nav-item" onClick={()=>{
                const rows=["Ticker,Portfolio,Price,Day%,1W%,1M%,3M%,YTD%,P/E,Yield,Sector"];
                allTickers.forEach(t=>{const d=stockData[t]||{};rows.push([t,d.portfolio,d.price,d.changePct,d.ret1w,d.ret1m,d.ret3m,d.retYtd,d.pe,d.divYield,d.sector].join(","))});
                const blob=new Blob([rows.join("\n")],{type:"text/csv"});
                const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="iown_portfolio.csv";a.click();URL.revokeObjectURL(url);
                setShowSidebar(false);
              }}>
                <span>📤</span><span>Export CSV</span>
              </div>
            </div>
          </div>
        </>
      )}

      {/* MAIN */}
      <main className="main">
        {!hasData&&!loading&&view==="portfolio"&&(
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:28,marginBottom:20,textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,fontFamily:"var(--serif)",marginBottom:8}}>Welcome to IOWN Terminal</div>
            <p style={{color:"var(--muted)",fontSize:14,lineHeight:1.6,marginBottom:16,maxWidth:500,margin:"0 auto 16px"}}>
              Deploy to GitHub Pages with the Action workflow enabled. Data refreshes automatically every 5 min during market hours.
            </p>
            <button className="btn" onClick={()=>fetchAll(true)}>Fetch Live Data Now</button>
          </div>
        )}
        {view==="portfolio"&&renderPortfolio()}
        {view==="screener"&&renderScreener()}
        {view==="allocation"&&renderAllocation()}
        {view==="research"&&renderResearch()}
        {view==="news"&&renderNews()}
      </main>

      {/* ADD STOCK MODAL */}
      {showAddModal&&(
        <div className="modal-overlay" onClick={()=>setShowAddModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontFamily:"var(--serif)",fontSize:18,marginBottom:14}}>Add Stock</h3>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input value={addTicker} onChange={e=>setAddTicker(e.target.value.toUpperCase())} placeholder="TICKER"
                style={{flex:1,padding:"12px 16px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:15,fontFamily:"var(--mono)",outline:"none"}}
                onKeyDown={e=>{if(e.key==="Enter"&&addTicker){addStock(addTicker,addPortfolio);setAddTicker("");setShowAddModal(false)}}}/>
              <select value={addPortfolio} onChange={e=>setAddPortfolio(e.target.value)}
                style={{padding:"12px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:13}}>
                {portKeys.map(k=><option key={k} value={k}>{portfolios[k].name}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn" onClick={()=>{if(addTicker){addStock(addTicker,addPortfolio);setAddTicker("");setShowAddModal(false)}}}>Add</button>
              <button className="btn-outline" onClick={()=>setShowAddModal(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* PORTFOLIO MANAGER */}
      {showPortfolioManager&&(
        <div className="modal-overlay" onClick={()=>setShowPortfolioManager(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontFamily:"var(--serif)",fontSize:18}}>Manage Portfolios</h3>
              <button onClick={()=>setShowPortfolioManager(false)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18}}>✕</button>
            </div>
            {portKeys.map(k=>{const p=portfolios[k];return(
              <div key={k} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                <div style={{width:12,height:12,borderRadius:3,background:p.color,flexShrink:0}}/>
                <span style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:600,flex:1}}>{p.name}</span>
                <span style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)"}}>{p.tickers.length} stocks</span>
                <button className="btn-outline btn-sm" onClick={()=>{const n=prompt("Rename portfolio:",p.name);if(n)renamePortfolio(k,n)}} style={{fontSize:9,padding:"3px 8px"}}>Rename</button>
                {!["dividend","growth","digital"].includes(k)&&(
                  <button className="btn-outline btn-sm btn-danger" onClick={()=>{if(confirm(`Delete "${p.name}"? Stocks won't be deleted.`))deletePortfolio(k)}} style={{fontSize:9,padding:"3px 8px"}}>Delete</button>
                )}
              </div>
            )})}
            <div style={{marginTop:16,display:"flex",gap:8}}>
              <input id="new-port-name" placeholder="New portfolio name..." style={{flex:1,padding:"10px 14px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:13,fontFamily:"var(--sans)",outline:"none"}}

              <button className="btn btn-sm" onClick={()=>{const el=document.getElementById("new-port-name");if(el.value){createPortfolio(el.value);el.value=""}}}>Create</button>
            </div>
            <div style={{marginTop:16,borderTop:"1px solid var(--border)",paddingTop:12}}>
              <button className="btn-outline btn-sm" onClick={()=>{setShowPortfolioManager(false);setShowBulkInspire(true)}} style={{marginRight:8}}>Bulk Edit Inspire Scores</button>
              <button className="btn-outline btn-sm" onClick={()=>{
                const rows=["Ticker,Portfolio,Price,Day%,1W%,1M%,3M%,YTD%,P/E,Yield,Sector"];
                allTickers.forEach(t=>{const d=stockData[t]||{};rows.push([t,d.portfolio,d.price,d.changePct,d.ret1w,d.ret1m,d.ret3m,d.retYtd,d.pe,d.divYield,d.sector].join(","))});
                const blob=new Blob([rows.join("\n")],{type:"text/csv"});
                const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="iown_portfolio.csv";a.click();URL.revokeObjectURL(url);
              }}>Export CSV</button>
            </div>
          </div>
        </div>
      )}

      {/* MOVE STOCK MODAL */}
      {showMoveModal&&(
        <div className="modal-overlay" onClick={()=>setShowMoveModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:400}}>
            <h3 style={{fontFamily:"var(--serif)",fontSize:18,marginBottom:14}}>Move {showMoveModal}</h3>
            <p style={{fontSize:12,color:"var(--muted)",marginBottom:12}}>Select destination portfolio:</p>
            {portKeys.map(k=>{const p=portfolios[k];const isHere=p.tickers.includes(showMoveModal);return(
              <div key={k} onClick={()=>{if(!isHere){const fromKey=getPortfolioKey(showMoveModal);moveStock(showMoveModal,fromKey,k);setShowMoveModal(null)}}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"12px",background:isHere?"var(--greenSoft)":"var(--card)",border:"1px solid "+(isHere?"var(--green)":"var(--border)"),borderRadius:"var(--radius-sm)",marginBottom:6,cursor:isHere?"default":"pointer",transition:"all .2s"}}>
                <div style={{width:10,height:10,borderRadius:3,background:p.color}}/>
                <span style={{fontFamily:"var(--mono)",fontSize:13,flex:1}}>{p.name}</span>
                {isHere&&<span style={{fontSize:10,color:"var(--green)",fontFamily:"var(--mono)"}}>Current</span>}
              </div>
            )})}
            <button className="btn-outline" onClick={()=>setShowMoveModal(null)} style={{marginTop:10,width:"100%"}}>Cancel</button>
          </div>
        </div>
      )}

      {/* BULK INSPIRE SCORES */}
      {showBulkInspire&&(
        <div className="modal-overlay" onClick={()=>setShowBulkInspire(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:500,maxHeight:"85vh"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <h3 style={{fontFamily:"var(--serif)",fontSize:18}}>Edit Inspire Scores</h3>
              <button onClick={()=>setShowBulkInspire(false)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18}}>✕</button>
            </div>
            <p style={{fontSize:11,color:"var(--muted)",marginBottom:12}}>Click any score to edit. Range: -100 to 100.</p>
            <div style={{maxHeight:"60vh",overflowY:"auto"}}>
              {allTickers.sort().map(t=>(
                <div key={t} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
                  <span style={{fontFamily:"var(--mono)",fontSize:12,fontWeight:600,color:"var(--green)",width:50}}>{t}</span>
                  <span style={{fontSize:11,color:"var(--muted)",flex:1}}>{NAMES[t]||t}</span>
                  <span style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:600,width:40,textAlign:"right",cursor:"pointer",
                    color:inspireScores[t]>=50?"var(--green)":inspireScores[t]>=0?"var(--gold)":inspireScores[t]!=null?"var(--red)":"var(--dim)"}}
                    onClick={()=>{const v=prompt(`Inspire Score for ${t} (-100 to 100):`,inspireScores[t]!=null?inspireScores[t]:"");if(v!=null&&v!=="")setInspireScores(p=>({...p,[t]:parseInt(v)}));else if(v==="")setInspireScores(p=>{const n={...p};delete n[t];return n})}}>
                    {inspireScores[t]!=null?inspireScores[t]:"—"}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

            {/* CONFIG PANEL */}
      {showConfig&&(
        <div className="config">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h3 style={{fontFamily:"var(--serif)",fontSize:17}}>Settings</h3>
            <button onClick={()=>setShowConfig(false)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18}}>✕</button>
          </div>
          <div className="config-section">
            <div className="stat-label">STATUS</div>
            <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,fontFamily:"var(--mono)",marginTop:6}}>
              <span className="status-dot" style={{color:hasData?"var(--green)":"var(--gold)",background:hasData?"var(--green)":"var(--gold)"}}/>
              <span style={{color:hasData?"var(--green)":"var(--gold)"}}>{hasData?`Live — ${Object.keys(quotes).length} quotes`:"Connecting..."}</span>
            </div>
            {lastRefresh&&<div style={{fontSize:10,color:"var(--dim)",fontFamily:"var(--mono)",marginTop:4}}>Updated {new Date(lastRefresh).toLocaleString()}</div>}
          </div>
          <div className="config-section">
            <div className="stat-label">PORTFOLIO</div>
            <div style={{fontSize:12,color:"var(--muted)",fontFamily:"var(--mono)",lineHeight:2,marginTop:4}}>
              {portKeys.map(k=>`${portfolios[k].name}: ${portfolios[k].tickers.length}`).join(' · ')} · Total: {allTickers.length}
            </div>
          </div>
          <div className="config-section">
            <div className="stat-label">GEMINI API KEY (Free)</div>
            <input value={aiKey} onChange={e=>{setAiKey(e.target.value);LS.set("gemini_key",e.target.value)}}
              placeholder="Paste Gemini API key..."
              style={{width:"100%",padding:"8px 10px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:11,fontFamily:"var(--mono)",outline:"none",marginTop:6}}/>
            <div style={{fontSize:9,color:"var(--dim)",fontFamily:"var(--mono)",marginTop:4}}>
              Free at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>
            </div>
          </div>
          <div className="config-section">
            <div className="stat-label">TACTICAL RULES</div>
            <div style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)",lineHeight:2,marginTop:4}}>
              TRIM: S&P 500 above 200DMA + 25% from lows → trim portfolio<br/>BUY: S&P 500 from ATH → T1: -20% · T2: -25% · T3: -30%
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexDirection:"column",marginTop:8}}>
            <button className="btn" onClick={()=>fetchAll(false)} disabled={loading}>Full Refresh (~4 min)</button>
            <button className="btn-outline" onClick={()=>fetchAll(true)} disabled={loading}>Quick Refresh (~1 min)</button>
            <button className="btn-outline" onClick={()=>{setPortfolios(DEFAULT_PORTFOLIOS);LS.set("portfolios_v2",DEFAULT_PORTFOLIOS)}}>Reset Portfolios</button>
            <button className="btn-outline btn-danger" onClick={()=>{
              LS.set("quotes",{});LS.set("metrics",{});LS.set("candles",{});LS.set("profiles",{});
              setQuotes({});setMetrics({});setCandles({});setProfiles({});setLastRefresh(null);LS.set("lastRefresh",null);
            }}>Clear Cache</button>
          </div>
        </div>
      )}

      {/* SCROLL TO TOP */}
      <button className={clx("scroll-top",showScrollTop&&"show")} onClick={()=>{haptic();const m=document.querySelector(".main");if(m)m.scrollTo({top:0,behavior:"smooth"})}}>↑</button>

      {/* MOBILE BOTTOM NAV */}
      <nav className="bottom-nav">
        {[
          {k:"portfolio",icon:"📊",label:"Portfolio"},
          {k:"screener",icon:"🔍",label:"Screener"},
          {k:"news",icon:"📰",label:"News"},
          {k:"research",icon:"✨",label:"Research"},
          {k:"allocation",icon:"📐",label:"Allocation"}
        ].map(v=>(
          <div key={v.k} className={clx("bottom-nav-item",view===v.k&&"active")} onClick={()=>{haptic();setView(v.k)}}>
            <span className="bn-icon">{v.icon}</span>
            <span className="bn-label">{v.label}</span>
          </div>
        ))}
      </nav>

      <footer className="ftr">
        <span>IOWN Terminal v4 · Intentional Ownership · Paradiem</span>
        <span>{hasData?`● LIVE · ${Object.keys(quotes).length}/${allTickers.length}`:"○ LOADING"} · Finnhub</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
