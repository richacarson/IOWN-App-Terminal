name: Refresh Portfolio Data

on:
  schedule:
    # Every 2 minutes during market hours (Mon-Fri 9:25 AM - 4:05 PM ET = 14:25 - 21:05 UTC)
    - cron: '*/2 14-21 * * 1-5'
    # Every 30 minutes outside market hours on weekdays
    - cron: '0,30 0-13,22-23 * * 1-5'
    # Every hour on weekends
    - cron: '0 * * * 0,6'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch portfolio data
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: |
          node scripts/fetch-data.js

      - name: Commit and push
        run: |
          git config user.name "IOWN Bot"
          git config user.email "bot@iown.dev"
          git add data/portfolio.json
          git diff --cached --quiet || (git commit -m "📊 Auto-refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
