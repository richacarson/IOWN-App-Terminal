<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#080c0a;--card:#0f1612;--card2:#141e18;--sidebar:#0a0f0c;
--border:#1a2b20;--border2:#243a2c;
--green:#4ade80;--greenDim:#1a4d2e;--greenDk:#3D4A2E;--greenMid:#5A6B42;
--red:#f87171;--redDim:#4c1111;--gold:#fbbf24;--goldDim:#5c4a0e;
--blue:#60a5fa;--blueDim:#1e3a5f;
--text:#dce8de;--muted:#7a9480;--dim:#4a6050;--white:#f0f7f1;
--mono:'DM Mono',monospace;--serif:'Playfair Display',Georgia,serif;--body:'EB Garamond',Georgia,serif;
}
body{font-family:var(--body);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;height:100dvh}
input,button,select{font-family:var(--mono)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
a{color:var(--green);text-decoration:none}a:hover{text-decoration:underline}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(–border);background:var(–sidebar);flex-shrink:0;gap:8px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(–greenMid),var(–greenDk));display:flex;align-items:center;justify-content:center;font:700 12px var(–mono);color:var(–white);letter-spacing:.05em}
.logo-text{font:700 16px var(–serif);letter-spacing:.02em}
.logo-tag{font:400 9px var(–mono);color:var(–muted);letter-spacing:.15em;text-transform:uppercase}
.nav{display:flex;gap:1px;background:var(–card);border-radius:6px;padding:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
.nav-btn{padding:6px 11px;border-radius:4px;border:none;background:transparent;color:var(–muted);cursor:pointer;font:400 11px var(–mono);transition:all .2s;white-space:nowrap}
.nav-btn.active{background:var(–greenDk);color:var(–green);font-weight:600}
.hdr-right{display:flex;align-items:center;gap:10px}
.clock{font:400 11px var(–mono);color:var(–dim);text-align:right;line-height:1.3}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.cfg-btn{background:none;border:1px solid var(–border);border-radius:4px;padding:4px 8px;color:var(–muted);cursor:pointer;font:400 10px var(–mono)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:16px}

/* CARDS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(–card);border:1px solid var(–border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .2s}
.stat-card.active{border-color:var(–greenDim)}
.stat-label{font:400 9px var(–mono);color:var(–muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.stat-val{font:700 22px var(–mono)}
.stat-sub{font:400 10px var(–mono);color:var(–muted);margin-top:3px}

/* TABLE */
.tbl-wrap{border-radius:8px;border:1px solid var(–border);overflow-x:auto;background:var(–card);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;font:400 9px var(–mono);color:var(–muted);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(–border);cursor:pointer;user-select:none;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(–border);font:400 12px var(–mono);white-space:nowrap}
tr.row:hover{background:var(–card2)}
tr.row{cursor:pointer;transition:background .15s}
.tk{font-weight:700;color:var(–green);font-size:13px}
.co{font-size:9px;color:var(–dim);font-weight:400}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:8px;letter-spacing:.05em}
.badge-sector{background:rgba(61,74,46,.4);color:var(–muted)}
.badge-div{background:var(–greenDim);color:var(–green)}
.badge-grw{background:var(–goldDim);color:var(–gold)}
.badge-dgt{background:var(–blueDim);color:var(–blue)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search{flex:1;min-width:180px;max-width:280px;padding:7px 12px;border-radius:6px;border:1px solid var(–border);background:var(–card);color:var(–text);font-size:12px;outline:none}
.filter-btn{padding:5px 10px;border-radius:4px;border:1px solid var(–border);background:transparent;color:var(–muted);cursor:pointer;font-size:10px;transition:all .15s}
.filter-btn.active{border-color:var(–greenDim);background:var(–greenDk);color:var(–green)}
.btn{padding:7px 16px;border-radius:6px;border:none;background:linear-gradient(135deg,var(–greenMid),var(–greenDk));color:var(–white);cursor:pointer;font:600 12px var(–mono);letter-spacing:.03em}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(–border);color:var(–muted)}
.btn-sm{padding:5px 10px;font-size:10px}
.btn-danger{border-color:var(–redDim);color:var(–red)}

/* DETAIL PANEL */
.detail{background:var(–card);border:1px solid var(–border);border-radius:10px;padding:18px;margin-bottom:16px}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
@media(max-width:700px){.detail-grid{grid-template-columns:repeat(2,1fr)}}
.metric{text-align:center}
.metric-label{font:400 8px var(–mono);color:var(–dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.metric-val{font:600 15px var(–mono)}

/* TABS inside detail */
.dtabs{display:flex;gap:1px;margin:14px 0 10px;border-bottom:1px solid var(–border)}
.dtab{padding:6px 14px;font:400 11px var(–mono);color:var(–muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.dtab.active{color:var(–green);border-bottom-color:var(–green)}

/* NEWS CARDS */
.news-card{display:block;background:var(–card);border:1px solid var(–border);border-radius:7px;padding:12px;margin-bottom:8px;transition:border .2s;cursor:pointer}
.news-card:hover{border-color:var(–greenDim);text-decoration:none}
.news-title{font:600 14px var(–body);color:var(–text);margin-bottom:3px}
.news-summary{font:400 11px var(–body);color:var(–muted);line-height:1.4}
.news-meta{font:400 9px var(–mono);color:var(–dim);margin-top:5px}

/* SCREENER */
.screener-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.screener-filters select,.screener-filters input{padding:6px 10px;border-radius:5px;border:1px solid var(–border);background:var(–card);color:var(–text);font-size:11px;outline:none}

/* SIGNAL ROWS */
.sig-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(–border)}
.sig-badge{padding:2px 7px;border-radius:3px;font:700 9px var(–mono);letter-spacing:.08em}

/* AI */
.ai-panel{background:var(–card);border:1px solid var(–border);border-radius:10px;padding:18px}
.ai-input{width:100%;padding:10px 14px;border-radius:6px;border:1px solid var(–border);background:var(–bg);color:var(–text);font:400 13px var(–body);outline:none}
.ai-resp{margin-top:12px;padding:12px;border-radius:7px;background:var(–bg);border:1px solid var(–border);font:400 13px var(–body);line-height:1.7;white-space:pre-wrap;max-height:400px;overflow:auto}

/* CONFIG PANEL */
.config{position:fixed;top:0;right:0;width:340px;height:100vh;background:var(–sidebar);border-left:1px solid var(–border);padding:16px;z-index:1000;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.6)}
.config-section{padding:12px;background:var(–bg);border-radius:6px;border:1px solid var(–border);margin-bottom:12px}

/* PROGRESS BAR */
.progress-bar{height:2px;background:var(–border);border-radius:1px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;background:var(–green);transition:width .3s}

/* SECTOR GRID */
.sector-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:700px){.sector-grid{grid-template-columns:1fr}}

/* FOOTER */
.ftr{padding:8px 16px;border-top:1px solid var(–border);display:flex;justify-content:space-between;font:400 9px var(–mono);color:var(–dim);background:var(–sidebar);flex-shrink:0}

/* SPARKLINE */
.spark{display:block}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;display:flex;align-items:center;justify-content:center}
.modal{background:var(–card);border:1px solid var(–border);border-radius:12px;padding:20px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}

/* UP/DOWN colors */
.up{color:var(–green)}.dn{color:var(–red)}.gold{color:var(–gold)}.blue{color:var(–blue)}
.green{color:var(–green)}.red{color:var(–red)}
</style>

const Spark = memo(({data,w=70,h=22,color})=>{

      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:20,marginBottom:16,textAlign:"center"}}>
        <div style={{fontSize:18,fontWeight:700,fontFamily:"var(--serif)",marginBottom:6}}>Deploy to Go Live</div>
        <p style={{color:"var(--muted)",fontSize:13,lineHeight:1.6,marginBottom:12}}>
          Upload this repo to <strong style={{color:"var(--green)"}}>IOWN-App-Terminal</strong> on GitHub with the Action workflow enabled.
          Data refreshes automatically every 5 min during market hours — terminal loads instantly.
        </p>
        <p style={{color:"var(--dim)",fontSize:10,fontFamily:"var(--mono)"}}>
          Add FINNHUB_KEY secret → enable Actions → data/portfolio.json auto-updates → instant startup
        </p>
        <button className="btn" style={{marginTop:12}} onClick={()=>fetchAll(true)}>Fetch Live Data Now</button>
      </div>
    )}
    {view==="portfolio"&&renderPortfolio()}
    {view==="screener"&&renderScreener()}
    {view==="news"&&renderNews()}
    {view==="signals"&&renderSignals()}
    {view==="sectors"&&renderSectors()}
    {view==="research"&&renderResearch()}
  </main>

  {/* ADD STOCK MODAL */}
  {showAddModal&&(
    <div className="modal-overlay" onClick={()=>setShowAddModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3 style={{fontFamily:"var(--serif)",fontSize:18,marginBottom:12}}>Add Stock to Portfolio</h3>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={addTicker} onChange={e=>setAddTicker(e.target.value.toUpperCase())} placeholder="Ticker (e.g. AAPL)" 
            style={{flex:1,padding:"10px 14px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:14,fontFamily:"var(--mono)",outline:"none"}}
            onKeyDown={e=>{if(e.key==="Enter"&&addTicker){addStock(addTicker,addPortfolio);setAddTicker("");setShowAddModal(false)}}}/>
          <select value={addPortfolio} onChange={e=>setAddPortfolio(e.target.value)}
            style={{padding:"10px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:13}}>
            <option value="dividend">Dividend</option>
            <option value="growth">Growth</option>
            <option value="digital">Digital Assets</option>
          </select>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn" onClick={()=>{if(addTicker){addStock(addTicker,addPortfolio);setAddTicker("");setShowAddModal(false)}}}>Add</button>
          <button className="btn-outline btn-sm" onClick={()=>setShowAddModal(false)}>Cancel</button>
        </div>
      </div>
    </div>
  )}

  {/* CONFIG PANEL */}
  {showConfig&&(
    <div className="config">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h3 style={{fontFamily:"var(--serif)",fontSize:16}}>Configuration</h3>
        <button onClick={()=>setShowConfig(false)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:16}}>✕</button>
      </div>
      <div className="config-section">
        <div className="stat-label">STATUS</div>
        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,fontFamily:"var(--mono)"}}>
          <span className="status-dot" style={{background:hasData?"var(--green)":"var(--gold)"}}></span>
          <span style={{color:hasData?"var(--green)":"var(--gold)"}}>
            {hasData?`Live — ${Object.keys(quotes).length} quotes loaded`:"Connecting..."}
          </span>
        </div>
      </div>
      <div className="config-section">
        <div className="stat-label">PORTFOLIO</div>
        <div style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)",lineHeight:1.8}}>
          Dividend: {divTickers.length} · Growth: {grwTickers.length} · Digital: {dgtTickers.length} · Total: {allTickers.length}
        </div>
      </div>
      <div className="config-section">
        <div className="stat-label">TACTICAL RULES</div>
        <div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--mono)",lineHeight:1.8}}>
          TRIM: Above 200DMA + 25% from lows<br/>BUY T1: -20% from 52W high<br/>BUY T2: -25% from 52W high<br/>BUY T3: -30% from 52W high
        </div>
      </div>
      <div style={{display:"flex",gap:6,flexDirection:"column"}}>
        <button className="btn" onClick={()=>fetchAll(false)} disabled={loading}>Full Refresh (~4 min)</button>
        <button className="btn-outline btn-sm" onClick={()=>fetchAll(true)} disabled={loading}>Quick Refresh (~1 min)</button>
        <button className="btn-outline btn-sm" onClick={()=>{
          LS.set("quotes",{});LS.set("metrics",{});LS.set("candles",{});LS.set("profiles",{});
          setQuotes({});setMetrics({});setCandles({});setProfiles({});setLastRefresh(null);LS.set("lastRefresh",null);
        }} style={{borderColor:"var(--redDim)",color:"var(--red)"}}>Clear Cache</button>
        <button className="btn-outline btn-sm" onClick={()=>{
          setDivTickers(DEFAULT_DIVIDEND);setGrwTickers(DEFAULT_GROWTH);setDgtTickers(DEFAULT_DIGITAL);
        }} style={{borderColor:"var(--goldDim)",color:"var(--gold)"}}>Reset Portfolios</button>
      </div>
    </div>
  )}

  {/* FOOTER */}
  <footer className="ftr">
    <span>IOWN Terminal v3 · Intentional Ownership · Paradiem</span>
    <span>{hasData?`● LIVE · ${Object.keys(quotes).length}/${allTickers.length}`:"○ LOADING"} · Finnhub</span>
  </footer>
</div>
```

);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>

</body>
